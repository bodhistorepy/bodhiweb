version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: local_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      # Ahora Docker busca estos valores de forma segura en tu entorno local
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: